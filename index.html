<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANPR Tracking System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid rgba(79, 195, 247, 0.3);
        }

        .header h1 {
            font-size: 32px;
            color: #4fc3f7;
            margin-bottom: 5px;
        }

        .header p {
            color: #bbb;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(79, 195, 247, 0.1);
            border: 2px solid rgba(79, 195, 247, 0.3);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 24px;
            font-weight: bold;
            color: #4fc3f7;
        }

        .stat-card .label {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        .camera-section {
            background: rgba(42, 42, 66, 0.8);
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 2px solid rgba(79, 195, 247, 0.2);
        }

        .camera-section h2 {
            color: #4fc3f7;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        video {
            width: 100%;
            min-height: 400px;
            border-radius: 8px;
            background: #000;
            border: 2px solid rgba(79, 195, 247, 0.3);
        }

        .detected-plate {
            background: linear-gradient(135deg, #0d47a1 0%, #0288d1 100%);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 3px;
            min-height: 70px;
            color: #fff;
            border: 2px solid #4fc3f7;
            box-shadow: 0 4px 15px rgba(79, 195, 247, 0.3);
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-entry {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
            border: 2px solid #4caf50;
        }

        .btn-entry:hover {
            background: linear-gradient(135deg, #45a049 0%, #3d8b40 100%);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        .btn-exit {
            background: linear-gradient(135deg, #f44336 0%, #da190b 100%);
            color: white;
            border: 2px solid #f44336;
        }

        .btn-exit:hover {
            background: linear-gradient(135deg, #da190b 0%, #c41c00 100%);
            box-shadow: 0 4px 15px rgba(244, 67, 54, 0.3);
        }

        .sidebar {
            background: rgba(42, 42, 66, 0.8);
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 2px solid rgba(79, 195, 247, 0.2);
            max-height: 600px;
            overflow-y: auto;
        }

        .sidebar h2 {
            color: #4fc3f7;
        }

        .vehicle-log {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .vehicle-item {
            background: rgba(51, 51, 76, 0.6);
            padding: 12px;
            border-left: 4px solid #4fc3f7;
            border-radius: 4px;
            font-size: 13px;
            border: 1px solid rgba(79, 195, 247, 0.2);
        }

        .vehicle-item .plate {
            font-weight: bold;
            color: #4fc3f7;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .vehicle-item .time {
            color: #aaa;
            font-size: 11px;
            margin: 2px 0;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 8px;
            font-weight: bold;
        }

        .status-ev {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .status-non-ev {
            background: rgba(255, 152, 0, 0.3);
            color: #ff9800;
            border: 1px solid #ff9800;
        }

        .status-active {
            background: rgba(79, 195, 247, 0.3);
            color: #4fc3f7;
            border: 1px solid #4fc3f7;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #4fc3f7;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(79, 195, 247, 0.3);
            border-radius: 50%;
            border-top-color: #4fc3f7;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            display: none;
            font-weight: bold;
        }

        .message.success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
            display: block;
        }

        .message.error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid #f44336;
            display: block;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
            
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }

            .stats-bar {
                grid-template-columns: 1fr;
            }

            button {
                padding: 10px 15px;
                font-size: 14px;
            }
        }

        /* Scrollbar styling */
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: rgba(79, 195, 247, 0.1);
            border-radius: 10px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(79, 195, 247, 0.3);
            border-radius: 10px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: rgba(79, 195, 247, 0.5);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚗 ANPR Tracking System</h1>
        <p>Automatic Number Plate Recognition & Vehicle Tracking</p>
    </div>

    <div style="max-width: 1400px; margin: 0 auto;">
        <div class="stats-bar">
            <div class="stat-card">
                <div class="number" id="totalVehicles">0</div>
                <div class="label">Total Vehicles</div>
            </div>
            <div class="stat-card">
                <div class="number" id="activeVehicles">0</div>
                <div class="label">Active</div>
            </div>
            <div class="stat-card">
                <div class="number" id="evCount">0</div>
                <div class="label">EV Vehicles</div>
            </div>
            <div class="stat-card">
                <div class="number" id="nonEvCount">0</div>
                <div class="label">Non-EV Vehicles</div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="camera-section">
            <h2>📹 Live Webcam Feed</h2>
            <img id="videoFeed" style="width: 100%; border-radius: 8px; background: #000; border: 2px solid rgba(79, 195, 247, 0.3);" src="/video_feed" alt="Video Feed">
            
            <div class="detected-plate" id="plateDisplay">
                🔍 Detecting...
            </div>
            
            <div class="controls">
                <button class="btn-entry" onclick="recordEntry()">📥 Entry (Press E)</button>
                <button class="btn-exit" onclick="recordExit()">📤 Exit (Press X)</button>
            </div>

            <div class="message" id="message"></div>
        </div>

        <div class="sidebar">
            <h2>📋 Vehicle Log</h2>
            <div class="vehicle-log" id="vehicleLog">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading vehicles...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000/api";
        let currentPlate = null;

        // Show message
        function showMessage(message, type = 'success') {
            const msg = document.getElementById('message');
            msg.textContent = message;
            msg.className = `message ${type}`;
            setTimeout(() => {
                msg.className = 'message';
            }, 3000);
        }

        // Get current detected plate from server
        async function updatePlate() {
            try {
                const response = await fetch(`${API_URL}/current-plate`);
                const data = await response.json();

                if (data.success && data.plate !== "Detecting...") {
                    currentPlate = data.plate;
                    document.getElementById("plateDisplay").textContent = data.plate;
                } else {
                    document.getElementById("plateDisplay").textContent = "🔍 Detecting...";
                }
            } catch (err) {
                console.error("Error fetching plate:", err);
            }
        }

        // Record entry
        async function recordEntry() {
            if (!currentPlate || currentPlate === "Detecting...") {
                showMessage("⚠️ No plate detected!", 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/record-entry?plate=${currentPlate}`, {
                    method: "POST"
                });
                const data = await response.json();
                
                if (data.success) {
                    showMessage(data.message, 'success');
                    loadVehicles();
                    loadStats();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (err) {
                console.error("Error:", err);
                showMessage("❌ Error recording entry", 'error');
            }
        }

        // Record exit
        async function recordExit() {
            if (!currentPlate || currentPlate === "Detecting...") {
                showMessage("⚠️ No plate detected!", 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/record-exit?plate=${currentPlate}`, {
                    method: "POST"
                });
                const data = await response.json();
                
                if (data.success) {
                    showMessage(data.message, 'success');
                    loadVehicles();
                    loadStats();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (err) {
                console.error("Error:", err);
                showMessage("❌ Error recording exit", 'error');
            }
        }

        // Load vehicle log
        async function loadVehicles() {
            try {
                const response = await fetch(`${API_URL}/vehicles`);
                const data = await response.json();

                const log = document.getElementById("vehicleLog");
                
                if (data.vehicles && data.vehicles.length > 0) {
                    log.innerHTML = "";
                    
                    data.vehicles.forEach(vehicle => {
                        const item = document.createElement("div");
                        item.className = "vehicle-item";
                        
                        const status = vehicle.ev_status ? 
                            `<span class="status-badge status-${vehicle.ev_status === 'EV' ? 'ev' : 'non-ev'}">${vehicle.ev_status}</span>` 
                            : "";
                        
                        const exitStatus = vehicle.exit_time ? 
                            `<span class="status-badge" style="background: rgba(156, 39, 176, 0.3); color: #9c27b0; border: 1px solid #9c27b0;">Exited</span>` 
                            : `<span class="status-badge status-active">Active</span>`;
                        
                        item.innerHTML = `
                            <div class="plate">${vehicle.plate} ${status}</div>
                            <div class="time">📥 Entry: ${vehicle.entry_time || 'N/A'}</div>
                            <div class="time">📤 Exit: ${vehicle.exit_time || 'Pending'}</div>
                            <div style="margin-top: 5px;">${exitStatus}</div>
                        `;
                        
                        log.appendChild(item);
                    });
                } else {
                    log.innerHTML = '<div class="empty-state">No vehicles logged yet</div>';
                }
            } catch (err) {
                console.error("Error loading vehicles:", err);
            }
        }

        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const data = await response.json();

                if (data.success && data.stats) {
                    document.getElementById("totalVehicles").textContent = data.stats.total_vehicles || 0;
                    document.getElementById("activeVehicles").textContent = data.stats.active_vehicles || 0;
                    document.getElementById("evCount").textContent = data.stats.ev_vehicles || 0;
                    document.getElementById("nonEvCount").textContent = data.stats.non_ev_vehicles || 0;
                }
            } catch (err) {
                console.error("Error loading stats:", err);
            }
        }

        // Keyboard shortcuts
        document.addEventListener("keydown", (e) => {
            if (e.key.toLowerCase() === 'e') recordEntry();
            if (e.key.toLowerCase() === 'x') recordExit();
        });

        // Initialize on page load
        window.addEventListener('load', () => {
            loadVehicles();
            loadStats();
            updatePlate();
            
            // Refresh every 1 second
            setInterval(() => {
                updatePlate();
                loadVehicles();
                loadStats();
            }, 1000);
        });
    </script>
</body>
</html>
