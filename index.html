<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANPR Smart Parking</title>

<style>
:root {
    --bg: #0b1220;
    --card: #111827;
    --border: #1f2937;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --primary: #3b82f6;
    --success: #10b981;
    --danger: #ef4444;
}

body {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
}

/* HEADER */
.header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    font-size: 20px;
    font-weight: 600;
}

/* LAYOUT */
.container {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
    padding: 20px;
}

/* CAMERA PANEL */
.camera {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
}

#videoFeed {
    width: 100%;
    border-radius: 8px;
}

/* DETECTED PLATE */
.plate {
    margin-top: 12px;
    text-align: center;
    font-size: 28px;
    font-weight: 600;
    background: #020617;
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 6px;
}

/* BUTTONS */
.controls {
    display: flex;
    gap: 10px;
    margin-top: 14px;
}

button {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #1f2937;
}

.entry {
    border-color: var(--success);
    color: var(--success);
}

.exit {
    border-color: var(--danger);
    color: var(--danger);
}

/* MESSAGE */
.message {
    margin-top: 12px;
    padding: 10px;
    border-radius: 6px;
    font-size: 14px;
    display: none;
}

.message.success {
    background: rgba(16,185,129,0.15);
    color: var(--success);
}

.message.error {
    background: rgba(239,68,68,0.15);
    color: var(--danger);
}

/* SIDEBAR */
.sidebar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    max-height: 85vh;
    overflow-y: auto;
}

.sidebar h3 {
    margin-top: 0;
    margin-bottom: 10px;
    font-weight: 600;
}

/* LOG CARD */
.card {
    background: #020617;
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 10px;
}

.card .plate {
    font-size: 16px;
    font-weight: 600;
    background: none;
    border: none;
    padding: 0;
    text-align: left;
    color: var(--primary);
}

.small {
    font-size: 12px;
    color: var(--muted);
}

.meta {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
}

.fare {
    color: var(--success);
}

.duration {
    color: #f59e0b;
}
</style>
</head>

<body>

<div class="header">
    Smart ANPR Parking System
</div>

<div class="container">

    <!-- CAMERA -->
    <div class="camera">
        <img id="videoFeed" src="/video_feed">

        <div class="plate" id="plateDisplay">Detecting...</div>

        <div class="controls">
            <button class="entry" onclick="recordEntry()">Record Entry</button>
            <button class="exit" onclick="recordExit()">Record Exit</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <!-- LOG -->
    <div class="sidebar">
        <h3>Vehicle Log</h3>
        <div id="vehicleLog"></div>
    </div>

</div>

<script>
const API = "http://localhost:8000/api";
let currentPlate = null;

function showMessage(msg, type="success") {
    const el = document.getElementById("message");
    el.innerText = msg;
    el.className = `message ${type}`;
    el.style.display = "block";

    setTimeout(() => el.style.display = "none", 3000);
}

/* LIVE PLATE */
async function updatePlate() {
    const res = await fetch(`${API}/current-plate`);
    const data = await res.json();

    if (data.plate && data.plate !== "Detecting...") {
        currentPlate = data.plate;
        document.getElementById("plateDisplay").innerText = data.plate;
    }
}

/* ENTRY */
async function recordEntry() {
    if (!currentPlate) return showMessage("No plate detected", "error");

    const res = await fetch(`${API}/record-entry?plate=${currentPlate}`, {method:"POST"});
    const data = await res.json();

    showMessage(data.message, data.success ? "success" : "error");
    loadVehicles();
}

/* EXIT */
async function recordExit() {
    if (!currentPlate) return showMessage("No plate detected", "error");

    const res = await fetch(`${API}/record-exit?plate=${currentPlate}`, {method:"POST"});
    const data = await res.json();

    if (data.success) {
        showMessage(`Fare: ${data.fare} | Duration: ${data.duration}`);
    } else {
        showMessage(data.message, "error");
    }

    loadVehicles();
}

/* VEHICLE LOG */
async function loadVehicles() {
    const res = await fetch(`${API}/vehicles`);
    const data = await res.json();

    const log = document.getElementById("vehicleLog");
    log.innerHTML = "";

    data.vehicles.forEach(v => {
        log.innerHTML += `
            <div class="card">
                <div class="plate">${v.plate}</div>
                <div class="small">Entry: ${v.entry_time}</div>
                <div class="small">Exit: ${v.exit_time || "Active"}</div>

                <div class="meta">
                    <div class="fare">${v.fare || "-"}</div>
                    <div class="duration">${v.duration || "-"}</div>
                </div>
            </div>
        `;
    });
}

/* AUTO REFRESH */
setInterval(() => {
    updatePlate();
    loadVehicles();
}, 1000);
</script>

</body>
</html>
